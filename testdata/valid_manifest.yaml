id: my-translator
name: 智能翻译助手
version: 1.2.0
type: service
summary: 支持 100+ 语言的实时翻译
description: 详细介绍...
publisher: "@my-team"
category: productivity
tags: [translation, nlp]
compatibility:
  keystone: ">=1.5.0"
pricing:
  type: free
runtime:
  mode: container
  image: my-team/translator:1.2.0
  port: 8080
  ports:
    - "9090:9090"
  volumes:
    - /data/models:/models
  health_check: /healthz
  resources:
    cpu: "0.5"
    memory: 512Mi
mount:
  service:
    auto_register_mcp: true
    mcp_endpoint: "http://localhost:8080/mcp"
    llm_mode: keystone_relay
    llm_requirements:
      supports_tool_calls: true
      min_context_tokens: 4000
dependencies:
  requires:
    - id: ks-mcp-lili
      version: ">=1.0.0"
  recommends:
    - id: ks-mcp-writer
      reason: 提升翻译润色质量
  conflicts:
    - id: old-translator
      reason: 端口冲突
permissions:
  network:
    level: restricted
    allowed_domains:
      - api.deepl.com
  llm:
    level: host_proxy
  filesystem:
    level: none
  user_context:
    level: read
